document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

n-items:center;justify-content:space-between;padding:16px 40px;background:rgba(11,18,32,0.82);backdrop-filter:blur(12px);border-bottom:1px solid #1c293b;\">\n      <div style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:0.1em;color:var(--acc);\">{{ headerKicker }}<\u002Fdiv>\n      <div onclick=\"{{ resetGo }}\" style=\"font-family:'IBM Plex Mono',monospace;font-size:11.5px;color:#5b6b82;cursor:pointer;border:1px solid #1c293b;padding:5px 11px;border-radius:7px;\" style-hover=\"color:#93a4bd;border-color:#25344a;\">reset quizzes<\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"max-width:860px;margin:0 auto;padding:40px 40px 90px;\">\n\n      <sc-if value=\"{{ isOverview }}\" hint-placeholder-val=\"{{ true }}\">\n        <div style=\"animation:fadeUp .5s ease;\">\n          <div style=\"font-family:'IBM Plex Mono',monospace;font-size:12.5px;color:#46c2d4;letter-spacing:0.06em;margin-bottom:14px;\">INTRO TO CLOUD COMPUTING · UNIT 1<\u002Fdiv>\n          <h1 style=\"font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:44px;line-height:1.05;letter-spacing:-0.02em;margin:0 0 18px;\">AWS Cloud Foundations<br><span style=\"color:var(--acc);\">study guide<\u002Fspan><\u002Fh1>\n          <p style=\"font-size:17px;color:#b9c6d8;max-width:620px;margin:0 0 12px;\">A study companion covering the ten core areas of AWS Cloud Foundations. Read each module, then test yourself with the quick check.<\u002Fp>\n          <p style=\"font-size:14px;color:#7f90a8;max-width:620px;margin:0 0 34px;\">Answer a module's quiz correctly to mark it passed. Progress is saved on this device.<\u002Fp>\n\n          <div style=\"display:grid;grid-template-columns:repeat(2,1fr);gap:14px;\">\n            <sc-for list=\"{{ overviewCards }}\" as=\"c\" hint-placeholder-count=\"10\">\n              <div onclick=\"{{ c.go }}\" style=\"{{ c.cardStyle }}\" style-hover=\"border-color:#33455f;transform:translateY(-2px);\">\n                <div style=\"display:flex;align-items ospace;font-size:11px;letter-spacing:0.1em;color:var(--acc);padding:3px 9px;border:1px solid color-mix(in srgb,var(--acc) 40%,transparent);border-radius:20px;\">QUICK CHECK<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:18px;margin-bottom:18px;\">{{ topic.quiz.q }}<\u002Fdiv>\n            <div style=\"display:flex;flex-direction:column;gap:10px;\">\n              <sc-for list=\"{{ topic.quiz.opts }}\" as=\"opt\" hint-placeholder-count=\"4\">\n                <div onclick=\"{{ opt.go }}\" style=\"{{ opt.style }}\">\n                  <span>{{ opt.text }}<\u002Fspan>\n                  <span style=\"{{ opt.markerStyle }}\">{{ opt.marker }}<\u002Fspan>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"display:flex;justify-content:space-between;gap:14px;margin-top:34px;\">\n            <div onclick=\"{{ topic.prevGo }}\" style=\"flex:1;padding:14px 18px;border-radius:11px;border:1px solid #1c293b;cursor:pointer;background:#101a29;\" style-hover=\"border-color:#25344a;\">\n              <div style=\"font-size:11px;color:#5b6b82;font-family:'IBM Plex Mono',monospace;\">← PREVIOUS<\u002Fdiv>\n              <div style=\"font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:14.5px;color:#c7d2e0;\">{{ topic.prevLabel }}<\u002Fdiv>\n            <\u002Fdiv>\n            <div onclick=\"{{ topic.nextGo }}\" style=\"flex:1;padding:14px 18px;border-radius:11px;border:1px solid #1c293b;cursor:pointer;background:#101a29;text-align:right;\" style-hover=\"border-color:var(--acc);\">\n              <div style=\"font-size:11px;color:#5b6b82;font-family:'IBM Plex Mono',monospace;\">NEXT →<\u002Fdiv>\n              <div style=\"font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:14.5px;color:var(--acc);\">{{ topic.nextLabel }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n    <\u002Fdiv>\n  <\u002Fmain>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{\n  &quot;$preview&quot;: { &quot;width&quot;: &quot;100%&quot;, &quot;height&quot;: &quot;100%&quot; },\n  &quot;accent&quot;: { &quot;editor&quot;: &quot;color&quot;, &quot;default&quot;: &quot;#ff9d3c&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;Theme&quot;, &quot;options&quot;: [&quot;#ff9d3c&quot;, &quot;#4a9df5&quot;, &quot;#a78bfa&quot;, &quot;#54d98c&quot;] }\n}\">\nconst KEY = 'aws-cloud-study-guide-v1';\n\nconst TOPICS = [\n  {\n    id: 't1', num: '01', title: 'Describing Cloud Concepts',\n    tag: 'What the cloud is, and why organizations adopt it.',\n    sections: [\n      { label: 'In your own words, what is cloud computing?', body: \"Cloud computing is the on-demand delivery of computing power, databases, storage, applications, and other IT resources over the Internet, with pay-as-you-go pricing. Using software gives organizations flexible solutions, unlike a rigid server infrastructure. Businesses can quickly implement solutions at a lower up-front cost.\" },\n      { label: 'What are the main service models and deployment models?', body: \"There are three main cloud service models: Infrastructure as a Service (IaaS), Platform as a Service (PaaS), and Software as a Service (SaaS).\\nIaaS: Provides the basic building blocks for Cloud IT and access to networking features, computers (virtual or on dedicated hardware), and data storage space. Has the highest level of flexibility and management control over IT resources.\\nPaaS: Reduces the need to manage the underlying infrastructure and focuses on the development and management of applications.\\nSaaS: Gives the completed product that service providers run and manage. SaaS refers to end-user applications, and this service is how the infrastructure is managed. This allows the users to plan the use of particular software. For example, a web-based email, where an email can be sent and received without managing additional features or maintaining the servers and the operating systems on which the email runs.\\n\\nThere are three main computing deployment models representing the cloud environments in which applications can be deployed: Cloud, Hybrid, and On-premises.\\nCloud: A cloud-based application is fully deployed, and all parts of the application run in the cloud. Applications in the cloud have either been created or migrated from existing infrastructure, taking advantage of cloud computing benefits.\\nHybrid: Is a way to connect infrastructure and applications with cloud-based resources and existing resources that are not on the cloud. This allows an organization to extend and grow its infrastructure into the cloud while maintaining on-premises servers.\\nOn-premises: This strictly deploys resources on-premises, using virtualization and resource management tools, in a private cloud. Provides the ability to dedicate resources.\" },\n      { label: 'Give a real example of an organization benefiting from the cloud.', body: \"Advantages of Cloud Computing:\\n1. Trading a capital expense for a variable expense. A capital expense is funds a company uses to acquire, upgrade, and maintain physical assets, such as property, buildings, or equipment. A variable expense is the cost that can easily be altered or avoided. Instead of investing heavily in data centers or servers before knowing their uses or resources, with cloud computing, a business only pays for what is consumed.\\n\\n2. Massive economies of scale. With cloud computing, organizations can achieve a lower variable cost, because the usage from hundreds of thousands of customers is aggregated into the cloud, providers like AWS can achieve higher economies of scale, which means lower prices.\" }\n    ],\n    quiz: { q: 'Why is the cloud more economical than traditional data centers for applications when computing various workloads?', opts: ['Costs are billed on monthly basis', 'Customers retain full administrative access to their instances', 'Instances can be launched on-demand when needed', 'Customers can permanently run enough instances to handle peak workloads'], correct: 2 }\n  },\n  {\n    id: 't2', num: '02', title: 'Cloud Economics & Billing',\n    tag: 'How cloud spending works and how to control it.',\n    sections: [\n      { label: 'Explain AWS pricing model', body: \"On-site infrastructure is installed locally on the company's own computers and servers. There are many fixed capital expenses, including facilities, hardware, licenses, and maintenance. Scaling up can be expensive and time-consuming, while scaling down would not reduce fixed costs.\\n\\nCloud infrastructure is purchased from a service provider who builds and maintains the facilities and hardware. The customer pays for what they use, and scaling up or down is simplified. Cost can be estimated because it depends on what service is used.\\n\\nWhen deciding the best option, you'll need to compare by using the total cost of ownership. A financial estimate that helps buyers and owners determine the direct and indirect costs of a product or system, service, and all the costs of owning the service.\" },\n      { label: 'Explain AWS pricing model.', body: \"There are three fundamental drivers of cost with AWS: compute, storage, and outbound data transfer. Compute is charged per hour/second and varies by instance type. Storage is typically charged per gigabyte. Outbound data transfers are aggregated across the service and then charged at the outbound data transfer rate. However, there is no charge for inbound data transfers or transfers between other AWS services. There are exceptions: verify the data transfer rates before starting the AWS service.\\n\\nAt the end of each month, pay for what you use. Start and stop using a product at anytime, and no long-term commitments are required. AWS's wide range of cloud computing services allows the organization to pay for its own needs. The utilitarian focus on pricing includes paying only for what you use, paying less by reserving, using more, and as AWS grows.\\n\\nPay for what is used: the consumer only pays for services that were actually used, with no high upfront cost. This lowers variable costs and eliminates the need to dedicate resources to infrastructure maintenance, server purchases, software licenses, or facility leasing. All AWS services are available on demand, with no long-term contracts or licensing dependencies.\\n\\nPay less when you reserve: Amazon EC2 and RDS allow the user to invest in reserved capacity. Reserved Instances can save up to 75% equivalent on-demand capacity. There are three options for reserved instances: all-upfront, partial-upfront, and no-upfront-payment. A larger discount is applied if a larger upfront payment has been made.\\n\\nPay less by using more: The organization can save more by using more, with tiered pricing for services like Amazon S3, EC2, or EBS, where the more you use, the less you pay per GB.\\n\\nPay less as AWS grows: AWS focuses on lowering the cost of doing business by reducing data center hardware costs, improving operational efficiencies, and lowering power consumption.\" },\n      { label: 'Which AWS cost-management tools would you use, and why?', body: \"The pricing calculator tool provides an estimate of an organization's monthly cost, including identifying opportunities to reduce costs. It is possible to model solutions before building, while exploring price points and calculations behind the estimates. Be able to find available instance types and contract terms to meet needs.\" }\n    ],\n    quiz: { q: 'What are the three fundamental drivers of AWS cloud pricing?', opts: ['Total Cost of Ownership, Onsite Servers, Software Licenses', 'Simple Storage, Elastic Compute, Elastic Block Storage', 'Compute, Storage, and Outbound Data Transfer', 'Pricing Calculator, Support, Billing and Cost'], correct: 2 }\n  },\n  {\n    id: 't3', num: '03', title: 'AWS Global Infrastructure',\n    tag: 'Regions, Availability Zones, and the global edge network.',\n    sections: [\n      { label: 'Explain Regions vs Availability Zones vs Edge Locations.', body: \"A region is a geographical area in which the user controls data replication. Regions typically consist of two or more availability zones. Currently, AWS has 22 regions worldwide. To ensure fault tolerance and stability, regions are isolated, and resources in one region are not automatically replicated to other regions.\\n\\nAn availability zone is one or more discrete data centers (typically three), while each data center contains hundreds of thousands of servers. Each availability zone is a fully isolated partition of AWS infrastructure. They are interconnected with other availability zones by using high-speed private networking, creating the ability to operate highly available applications and databases that are scalable and fault-tolerant.\\n\\nEdge locations are used to distribute content to end users from Amazon CloudFront (CDN), and Route 53 DNS services are automatically routed to the nearest location to reduce latency. Regional edge caches are used when content is not accessed frequently enough to remain in the edge location. Edge locations and regional edge caches improve performance by caching content closer to the user.\" },\n      { label: 'What factors decide which Region to deploy in?', body: \"When determining a region to deploy, consider data governance and legal requirements. Some laws might restrict the regions where you can offer content or services. It is best practice to select a region as close as possible to users and systems that will access them, reducing latency. There is some cost variation in running certain services depending on the chosen region. For example, running an on-demand t3.medium EC2 instance in the US East region may cost $0.0416 per hour, versus in the Asia Pacific region, which may cost $0.0544 per hour.\" },\n      { label: 'How do Availability Zones support high availability? Give an example.', body: \"Availability zones support highly available applications because applications are isolated and partitioned across zones, protecting companies from issues like catastrophic data center failure. An availability zone must be selected where the systems reside; however, systems can span multiple zones. It's recommended to replicate across zones for resiliency.\" }\n    ],\n    quiz: { q: 'What component of AWS global infrastructure does Amazon CloudFront use to ensure low-latency delivery?', opts: ['Regions', 'Edge locations', 'Availability zones', 'Virtual Private Cloud'], correct: 1 }\n  },\n  {\n    id: 't4', num: '04', title: 'AWS Cloud Security',\n    tag: 'The Shared Responsibility Model and identity management.',\n    sections: [\n      { label: 'Explain the Shared Responsibility Model in your own words.', body: \"AWS and the customer share the responsibility for security and compliance. This model helps relieve customers of the operational burden while providing flexibility and control, enabling the customer's deployment solutions on AWS, and still remaining responsible for some aspects of security.\\n\\nAWS is responsible for protecting the infrastructure comprising the hardware, software, networking, and facilities running the AWS Cloud service.\\n\\nCustomers are responsible for encrypting data at rest or in transit. Also, customers should ensure the network is configured for security by ensuring credentials and logins are properly managed, security groups are set up, and the operating systems running on compute instances they launch include OS updates, security patches, and firewalls.\" },\n      { label: 'What is IAM, and what are good security practices?', body: \"Identity and Access Management allows users to control access to compute, storage, database, and application services in the AWS cloud. IAM can be used for handling authentication, specifying and enforcing authorization policies, and defining which users can access which services. This tool centrally manages access to launching, configuring, managing, and terminating resources in the AWS account, making it possible to grant different permissions to different people for different resources. This AWS feature is offered at no additional charge.\\n\\nIAM user is a person or application defined in an AWS account that must make API calls to AWS products. Each user has a unique name and a set of security credentials not shared with others.\\nIAM group is a collection of IAM users that simplifies specifying and managing permissions for multiple users.\\nIAM policy is a document defining permissions to determine a user's access in the AWS account.\\nIAM role is a tool granting temporary access to specific AWS resources in an AWS account.\" },\n      { label: 'Name key AWS security services and what each protects against.', body: \"AWS Organizations enables users to consolidate multiple AWS accounts by centrally managing them, grouping accounts into organizational units, attaching different policies to each OU, integrating with IAM, and using service control policies to establish controls over the AWS services and API actions each account can access.\\n\\nAWS Key Management Service (KMS) enables users to create and manage encryption keys, allows control of encryption across AWS services and applications, and integrates with CloudTrail to log all key usage. KMS uses hardware security modules validated by FIPS 140-2.\\n\\nAWS Cognito adds user sign-ups, sign-ins, and access control to web and mobile applications, using standards such as SAML 2.0 to meet security and compliance requirements.\\n\\nAWS Shield manages distributed denial of service (DDoS) protection, safeguards applications on AWS, provides always-on detection and automatic inline mitigations, and helps minimize application downtime and latency. Shield Standard is free; Shield Advanced is an optional paid service.\" }\n    ],\n    quiz: { q: 'Which of the following is AWS\\u2019s responsibility under the shared responsibility model?', opts: ['Configuring third-party applications', 'Maintaining physical hardware', 'Securing application access and data', 'Managing custom Amazon Machine Images (AMIs)'], correct: 1 }\n  },\n  {\n    id: 't5', num: '05', title: 'Networking & Content Delivery',\n    tag: 'Virtual networks, firewalls, DNS, and the CDN.',\n    sections: [\n      { label: 'What is a VPC, and how do public and private subnets differ?', body: \"A Virtual Private Cloud (VPC) is a service that allows the provision of a logically isolated section of the AWS Cloud where AWS resources can be launched. This gives the user control over their virtual networking resources, including selection of IP address range, creation of subnets, and configuration of route tables and network gateways. A VPC is dedicated to the user's account, belongs to a single region, and can span multiple availability zones. Once created, it can be divided into one or more subnets — public subnets have direct access to the internet, private subnets do not.\\n\\nInternet gateway is a scalable, redundant, and highly available VPC component that allows communication between instances in the VPC and the internet, and performs network address translation for instances assigned public IPv4 addresses.\\n\\nA NAT gateway enables instances in private subnets to connect to the internet or AWS services but prevents the internet from initiating a connection with those instances. It resides in a public subnet with an Elastic IP address, and the route table for private subnets is updated to point internet-bound traffic to it.\" },\n      { label: 'Compare Security Groups and Network ACLs.', body: \"Security groups are the virtual firewall for the instance, controlling inbound and outbound traffic at the instance level, not the subnet level. Each instance in a VPC subnet can be assigned a different set of security groups. Security groups are stateful — response traffic for an allowed request is automatically allowed to flow regardless of inbound/outbound rules.\\n\\nNetwork Access Control Lists (ACLs) are an optional layer of security for the VPC, acting as a firewall controlling traffic in and out of one or more subnets. All subnets must be associated with an ACL (defaulting to the default ACL if none is set). Network ACLs have separate inbound and outbound rules and, by default, allow all traffic. They are stateless — no information about a request is maintained after it's processed.\" },\n      { label: 'What do Route 53 and CloudFront do?', body: \"Route 53 is a highly available and scalable DNS web service. It routes end users to internet applications by translating names into numeric IP addresses. Route 53 connects user requests to infrastructure running AWS services like EC2, ELB, and S3, and can route users to infrastructure outside AWS. It can configure DNS health checks and route traffic to healthy endpoints.\\n\\nAmazon CloudFront is a fast content delivery network (CDN) — a globally distributed system of caching servers. A CDN caches copies of commonly requested static files (HTML, CSS, JavaScript, images) hosted on an origin server, delivering a local copy from the nearest edge location for the fastest delivery. CloudFront provides fast, secure delivery of data, videos, applications, and APIs globally with low latency and high transfer speeds, priced pay-as-you-go.\" }\n    ],\n    quiz: { q: 'Which AWS networking service allows a company to create a virtual network in AWS?', opts: ['AWS Config', 'Route 53', 'AWS Direct Connect', 'VPC'], correct: 3 }\n  },\n  {\n    id: 't6', num: '06', title: 'Compute',\n    tag: 'Virtual servers, serverless functions, and containers.',\n    sections: [\n      { label: 'Describe Amazon EC2 and how you would choose an instance.', body: \"Amazon Elastic Compute Cloud (EC2) provides virtual machines as an IaaS service, offering scaling flexibility and offloading many server management responsibilities to the user. EC2 instances give full control over guest operating systems (Windows and Linux). An instance can be launched at any size in a global availability zone from Amazon Machine Images (AMIs) with a few clicks or a line of code, and be ready in minutes. Control traffic to and from instances by using security groups, and build solutions through multiple AWS services.\\n\\nWhen choosing an instance type, determine the memory (RAM), processing power (CPU), disk space and type (storage), and network performance. Instance types offer families, generations, and sizes, allowing flexibility in choosing an appropriate mix of resources for applications.\\n\\nAWS Elastic Beanstalk can also quickly deploy resources that make use of different programming languages, such as .NET and Java.\" },\n      { label: 'What is serverless, and when would you use Lambda over EC2?', body: \"Serverless computing does not require provisioning or managing servers. AWS Lambda is an event-driven, serverless compute service that enables users to run code without provisioning or managing servers. A Lambda function is an AWS resource that contains uploaded code, triggered either on a schedule or in response to an event. Code only runs when triggered — you pay for compute time consumed and are not charged when the code is not running. The maximum memory allocation for a single Lambda function is 10,240 MB, and the maximum run time is 15 minutes.\" },\n      { label: 'How do containers fit in (ECS / EKS / Fargate)?', body: \"Amazon ECS / EKS / Fargate are container-based computing services, enabling multiple workloads to run quickly on a single OS. Containers use operating-system virtualization, running applications and dependencies in resource-isolated processes. Containers package an application's code, configurations, and dependencies into easy-to-use building blocks, delivering environmental consistency, operational efficiency, developer productivity, and version control. Containers spin up faster than virtual machines because they don't contain an entire operating system, and a single application can span multiple containers. Fargate containers run serverlessly, reducing administrative overhead.\" }\n    ],\n    quiz: { q: 'Which AWS service can quickly deploy resources that make use of different programming languages such as .NET and Java?', opts: ['CloudFormation', 'SQS', 'Elastic Beanstalk', 'Elastic Compute Cloud (Amazon EC2)'], correct: 2 }\n  },\n  {\n    id: 't7', num: '07', title: 'Storage',\n    tag: 'Object, block, and file storage — and when to use each.',\n    sections: [\n      { label: 'Compare object, block, and file storage on AWS.', body: \"Block storage allows changing the block containing a piece of data, while in object storage, the entire object must be updated. Block storage is faster and uses less bandwidth; however, costs are higher than object storage.\\n\\nAmazon EBS enables the creation of individual storage volumes and attaching them to an EC2 instance. EBS is block-level storage that automatically replicates the volume within the availability zone, and can be backed up automatically to Amazon S3 via snapshots. Uses include boot volumes, data storage with a file system, database hosts, and enterprise applications. Cost is based on volume storage provisioned in GB per month, plus I/O charged by request count.\\n\\nAmazon S3 is object-level storage — if part of a file changes, the entire object must be re-uploaded. S3 stores data as objects within buckets, redundantly across multiple facilities within a region. It automatically manages storage as data grows, scales high-volume requests, requires no provisioning, and bills only for what's used. Commonly used for application assets, static web hosting, backup and disaster recovery, and staging for big data.\\n\\nAmazon EFS is a manageable, scalable file storage service in the AWS Cloud, ideal for large data and analytics, media processing, content management, web serving, and home directories. It requires no minimum fee or setup cost.\" },\n      { label: 'What S3 storage classes exist and how do they affect cost?', body: \"S3 Standard is designed for high durability, availability, and performance for frequently accessed data, delivering low latency and high throughput — used for cloud applications, websites, content distribution, and big data analytics.\\n\\nS3 Intelligent-Tiering optimizes cost by automatically moving data between access tiers without performance impact, for a small monthly monitoring fee — great for unpredictable access patterns.\\n\\nS3 Standard-Infrequent Access is for data accessed less frequently but needing rapid access when needed, at a lower per-GB storage and retrieval price — good for long-term storage, backups, and disaster recovery files.\\n\\nS3 One Zone-Infrequent Access is similarly for infrequent access data, but stored redundantly across a minimum of three availability zones — a cost-effective choice for secondary backup copies or recreatable data.\\n\\nS3 Glacier is secure, durable, low-cost archival storage, with three retrieval options ranging from minutes to hours.\\n\\nS3 Glacier Deep Archive is the lowest-cost S3 class, for long-term retention and digital preservation of data accessed once or twice a year — used in highly regulated industries retaining datasets for 7-10+ years, with objects replicated across at least three availability zones and restorable within 12 hours.\" },\n      { label: 'Describe an example that uses more than one storage type.', body: \"Common case scenarios are to provide backup and storage services for others, application hosting services that deploy, install, and manage web applications, media hosting with a redundant, scalable, and highly available infrastructure that hosts video, photo, or music uploads and downloads, and software delivery hosting downloadable software applications.\" }\n    ],\n    quiz: { q: 'A company wants to store data that is not frequently accessed. What is the best cost-effective AWS solution to consider?', opts: ['Storage Gateway', 'Simple Storage Service Glacier', 'Elastic Block Store', 'Simple Storage Service'], correct: 1 }\n  },\n  {\n    id: 't8', num: '08', title: 'Databases',\n    tag: 'Managed relational, NoSQL, caching, and analytics.',\n    sections: [\n      { label: 'Explain the difference between Amazon RDS and DynamoDB.', body: \"Relational Database Service (RDS) is a managed service that sets up and operates a relational database in the cloud, providing cost-efficient and resizable capacity while automating time-consuming administrative tasks like OS patches, software patching, automatic backups, and high availability. Use RDS for complex transactions or queries, medium-to-high query or write rates (up to 30,000 IOPS), and high durability needs. Not ideal for massive reads/writes, sharding due to size/throughput demands, or simple GET/PUT requests better handled by NoSQL.\\n\\nDynamoDB is a fast and flexible NoSQL database service for applications that need consistent single-digit millisecond latency at any scale. It automatically partitions data, has no practical limit on items stored in a table, and automatically replicates tables across the chosen AWS region. Works great for mobile, web, gaming, adtech, and IoT applications.\" },\n      { label: 'How does RDS provide high availability and scale reads?', body: \"RDS's most powerful feature is configuring database instances for high availability with a Multi-AZ deployment, which automatically generates a standby copy of the database instance in another Availability Zone within the same VPC, synchronously replicating transactions to it. This enhances availability during planned maintenance and protects against instance failure or AZ disruption — RDS automatically brings the standby online as the new primary, using the RDS DNS endpoint so no application code changes are needed. Read replicas can also be created in a different region, satisfying disaster recovery requirements and reducing latency by directing reads closer to the user.\" },\n      { label: 'When would you use ElastiCache or Redshift?', body: \"Redshift is a fast data warehouse to cost-effectively analyze data using standard SQL and existing BI tools, running analytic queries against petabytes of structured data using query optimization, columnar storage, and massively parallel processing, with most results returning in seconds. Used by big-data customers needing agility across existing systems, easily scalable with no downtime, continuous monitoring, and built-in encryption.\" }\n    ],\n    quiz: { q: 'Which of the following AWS services is a fully managed NoSQL database service?', opts: ['Relational Database Service (Amazon RDS)', 'DynamoDB', 'Aurora', 'Redshift'], correct: 1 }\n  },\n  {\n    id: 't9', num: '09', title: 'Cloud Architecture',\n    tag: 'The Well-Architected Framework and design principles.',\n    sections: [\n      { label: 'Name the six pillars of the Well-Architected Framework.', body: \"The six pillars of the Well-Architected Framework are operational excellence, security, reliability, performance efficiency, cost optimization, and sustainability.\\n\\nOperational excellence focuses on running and monitoring systems to deliver business value and continually improve support processes by automating changes, responding to events, and defining standards.\\n\\nSecurity focuses on protecting information, systems, and assets through risk assessment and mitigation, protecting confidentiality and integrity of data, managing identity, and detecting security events.\\n\\nReliability ensures a workload performs its intended function correctly and consistently through distributed system design, recovery planning, and handling change.\\n\\nPerformance efficiency uses IT and computing resources to meet system requirements and maintains that efficiency as demand changes, by selecting the right resource types and sizes, monitoring performance, and evolving as needs change.\\n\\nCost optimization focuses on avoiding unnecessary costs by understanding and controlling spend, selecting appropriate resource types, and scaling without overspending.\\n\\nSustainability targets response to regulation, competitive advantage, and stakeholder demand — every action to reduce resource consumption contributes to lower environmental impact and sustainability goals.\" },\n      { label: 'What core design principles make an architecture resilient?', body: \"A core AWS design principle is to plan for failure — two factors to consider when designing architectures are reliability and availability.\\n\\nReliability is a measure of a system's ability to provide functionality when desired by the user, expressed as the probability the system functions as intended over a given period (mean time between failures).\\n\\nAvailability is the percentage of time a system is operating and correctly performing as expected. High availability allows a system to withstand some degradation while remaining available, with minimal downtime and no human intervention required.\" },\n      { label: 'Describe a loosely-coupled architecture and why it helps.', body: \"A loosely coupled architecture is a style where individual components of an application are built independently from one another. Each component performs a specific function that can be used by any number of other services. This pattern is generally slower to implement but allows beneficial application scaling, letting teams develop features, deploy, and scale independently — enabling organizations to quickly iterate individual components.\" }\n    ],\n    quiz: { q: 'A SysOps engineer at a company wants to protect their data in transit and at rest. What services could they use to protect their data?', opts: ['Elastic Load Balancing', 'Elastic Block Storage', 'Simple Storage Service', 'All of the above'], correct: 3 }\n  },\n  {\n    id: 't10', num: '10', title: 'Auto Scaling & Monitoring',\n    tag: 'Matching capacity to demand and observing the system.',\n    sections: [\n      { label: 'What does EC2 Auto Scaling do, and what triggers it?', body: \"The EC2 Auto Scaling service helps maintain application availability by automatically adding or removing EC2 instances according to defined conditions. An Auto Scaling group is a collection of EC2 instances. A launch configuration specifies information for the instance, including AMI, instance type, AWS identity, and EBS volumes. By defining minimum/maximum instances and desired capacity, the Auto Scaling group is launched into a subnet within the VPC. Scaling can be set to maintain current instance levels at all times, scale manually, use predictive scaling, or schedule scaling.\" },\n      { label: 'How does Elastic Load Balancing complement Auto Scaling?', body: \"EC2 Auto Scaling integrates with Elastic Load Balancing, enabling one or more load balancers to be attached to an existing Auto Scaling group. Once attached, the load balancer automatically registers the instances in the group and distributes incoming traffic across them.\" },\n      { label: 'Compare Amazon CloudWatch and AWS CloudTrail.', body: \"CloudWatch monitors AWS resources and applications running on AWS, collecting and tracking standard and custom metrics. It can set alarms through notifications (e.g. SNS topics) or trigger EC2 Auto Scaling or EC2 actions. Events can be defined as rules that match changes in the AWS environment and route them to target functions or streams for processing.\" }\n    ],\n    quiz: { q: 'Which service would you use to send alerts based on Amazon CloudWatch alarms?', opts: ['Simple Notification Service', 'CloudTrail', 'Trusted Advisor', 'Route 53'], correct: 0 }\n  }\n];\n\nclass Component extends DCLogic {\n  state = { active: 'overview', answers: this.load() };\n\n  constructor(props) { super(props); this.mainRef = React.createRef(); }\n  load() { try { return JSON.parse(localStorage.getItem(KEY)) || {}; } catch (e) { return {}; } }\n  persist(a) { try { localStorage.setItem(KEY, JSON.stringify(a)); } catch (e) {} }\n\n  componentDidMount() { this.applyAccent(); }\n  componentDidUpdate() { this.applyAccent(); }\n  applyAccent() {\n    const a = this.props.accent || '#ff9d3c';\n    try { document.documentElement.style.setProperty('--acc', a); } catch (e) {}\n  }\n\n  select = (id) => {\n    this.setState({ active: id }, () => {\n      if (this.mainRef.current) this.mainRef.current.scrollTop = 0;\n    });\n  };\n\n  isDone(t) { return this.state.answers[t.id] === t.quiz.correct; }\n\n  answer = (tid, idx) => {\n    const t = TOPICS.find((x) => x.id === tid);\n    if (!t) return;\n    if (this.state.answers[tid] === t.quiz.correct) return;\n    const answers = Object.assign({}, this.state.answers, { [tid]: idx });\n    this.setState({ answers });\n    this.persist(answers);\n  };\n\n  reset = () => { this.setState({ answers: {} }); this.persist({}); };\n\n  navRow(active) {\n    return 'display:flex;align-items:center;gap:11px;padding:9px 12px;border-radius:9px;cursor:pointer;font-size:13.5px;margin-bottom:2px;transition:background .15s,color .15s;' +\n      (active\n        ? 'color:#e9eef6;font-weight:600;border:1px solid #25344a;background:#141f30;'\n        : 'color:#93a4bd;font-weight:500;border:1px solid transparent;');\n  }\n  navBadge(active, done) {\n    const base = 'width:26px;height:22px;border-radius:6px;display:grid;place-items:center;font-size:11px;font-family:\\'IBM Plex Mono\\',monospace;font-weight:600;flex-shrink:0;';\n    if (done) return base + 'background:rgba(84,217,140,0.14);color:#54d98c;border:1px solid rgba(84,217,140,0.4);';\n    if (active) return base + 'background:color-mix(in srgb,var(--acc) 15%,transparent);color:var(--acc);border:1px solid color-mix(in srgb,var(--acc) 50%,transparent);';\n    return base + 'background:#18263a;color:#8092a8;border:1px solid #25344a;';\n  }\n\n  renderVals() {\n    const { active, answers } = this.state;\n    const correctCount = TOPICS.filter((t) => this.isDone(t)).length;\n    const isOverview = active === 'overview';\n    const activeTopic = TOPICS.find((t) => t.id === active) || null;\n    const isTopic = !!activeTopic;\n\n    const modules = TOPICS.map((t) => {\n      const done = this.isDone(t);\n      const act = active === t.id;\n      return {\n        label: t.title,\n        badgeText: done ? '✓' : t.num,\n        rowStyle: this.navRow(act),\n        badgeStyle: this.navBadge(act, done),\n        go: () => this.select(t.id)\n      };\n    });\n\n    const overviewCards = TOPICS.map((t) => {\n      const done = this.isDone(t);\n      return {\n        num: t.num, title: t.title, tag: t.tag,\n        cardStyle: 'padding:18px;border-radius:14px;background:#101a29;border:1px solid ' + (done ? 'rgba(84,217,140,0.35)' : '#1c293b') + ';cursor:pointer;transition:transform .18s,border-color .18s;',\n        badgeStyle: this.navBadge(false, done),\n        statusStyle: 'font-family:\\'IBM Plex Mono\\',monospace;font-size:11px;' + (done ? 'color:#54d98c;' : 'color:#5b6b82;'),\n        statusText: done ? '✓ Passed' : 'Start →',\n        go: () => this.select(t.id)\n      };\n    });\n\n    let topic = null;\n    if (activeTopic) {\n      const t = activeTopic;\n      const sel = answers[t.id];\n      const correct = t.quiz.correct;\n      const answered = sel !== undefined;\n      const gotIt = sel === correct;\n      const optBase = 'display:flex;align-items:center;justify-content:space-between;gap:12px;padding:14px 16px;border-radius:11px;font-size:14.5px;border:1px solid #25344a;background:#18263a;color:#d6e0ee;transition:all .15s;cursor:pointer;';\n\n      const quizOpts = t.quiz.opts.map((text, i) => {\n        let style, marker = '', markerStyle = 'visibility:hidden;';\n        if (gotIt && i === correct) {\n          style = 'display:flex;align-items:center;justify-content:space-between;gap:12px;padding:14px 16px;border-radius:11px;font-size:14.5px;border:1px solid rgba(84,217,140,0.55);background:rgba(84,217,140,0.13);color:#d6f5e2;cursor:default;';\n          marker = '✓'; markerStyle = 'color:#54d98c;font-weight:700;';\n        } else if (answered && i === sel && !gotIt) {\n          style = 'display:flex;align-items:center;justify-content:space-between;gap:12px;padding:14px 16px;border-radius:11px;font-size:14.5px;border:1px solid rgba(247,119,119,0.55);background:rgba(247,119,119,0.12);color:#f9d6d6;cursor:pointer;';\n          marker = '✗'; markerStyle = 'color:#f77;font-weight:700;';\n        } else if (gotIt) {\n          style = optBase + 'opacity:0.45;cursor:default;';\n        } else {\n          style = optBase;\n        }\n        return { text, style, marker, markerStyle, go: () => this.answer(t.id, i) };\n      });\n\n      const idx = TOPICS.indexOf(t);\n      const prev = idx === 0 ? { label: 'Overview', go: () => this.select('overview') } : { label: TOPICS[idx - 1].title, go: () => this.select(TOPICS[idx - 1].id) };\n      const next = idx === TOPICS.length - 1 ? { label: 'Overview', go: () => this.select('overview') } : { label: TOPICS[idx + 1].title, go: () => this.select(TOPICS[idx + 1].id) };\n\n      topic = {\n        num: t.num, title: t.title, tag: t.tag, sections: t.sections,\n        quiz: { q: t.quiz.q, opts: quizOpts },\n        prevLabel: prev.label, prevGo: prev.go, nextLabel: next.label, nextGo: next.go\n      };\n    }\n\n    const headerKicker = isOverview ? 'STUDY GUIDE · 10 MODULES' : ('MODULE ' + activeTopic.num + ' / 10');\n\n    return {\n      mainRef: this.mainRef,\n      correctCount, totalTopics: TOPICS.length,\n      progressPct: Math.round((correctCount / TOPICS.length) * 100) + '%',\n      isOverview, isTopic,\n      overviewGo: () => this.select('overview'),\n      resetGo: this.reset,\n      overviewRowStyle: this.navRow(isOverview),\n      overviewBadgeStyle: this.navBadge(isOverview, false),\n      modules, overviewCards, topic, headerKicker\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
